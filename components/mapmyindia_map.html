<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
html,body,#map{width:100%;height:100%;margin:0;padding:0}
.info-popup{font-family:Arial,sans-serif;font-size:12px;line-height:1.5}
.info-popup b{color:#c0392b}
</style>
<script src="https://sdk.mappls.com/map/sdk/web?v=3.0&access_token={API_KEY}&callback=initMap" defer async></script>
</head>
<body>
<div id="map"></div>
<script>
var HOTSPOT_DATA = __HOTSPOT_DATA__;
var map;

function initMap() {
    map = new mappls.Map('map', {
        center: { lat: 12.9716, lng: 77.5946 },
        zoom: 12
    });

    map.addListener('load', function() {
        // 1. Prepare and Add Heatmap Layer
        var heatData = HOTSPOT_DATA.map(function(h) {
            return { lat: h.lat, lng: h.lon };
        });

        if (heatData.length > 0) {
            new mappls.HeatmapLayer({
                map: map,
                data: heatData,
                opacity: 0.8,
                radius: 20,
                maxIntensity: 15
            });
        }

        // 2. Add Top 10 Markers
        var top10 = HOTSPOT_DATA.slice(0, 10);
        top10.forEach(function(h) {
            var popupContent = '<div class="info-popup">'
                + '<b>Zone ' + h.cluster_id + '</b><br>'
                + 'Primary Offence: ' + h.top_violation + '<br>'
                + 'Cases: ' + h.violation_count + '<br>'
                + 'Risk Score: ' + h.congestion_score.toFixed(1) + '<br>'
                + 'Station: ' + h.top_police_station
                + '</div>';

            new mappls.Marker({
                map: map,
                position: { lat: h.lat, lng: h.lon },
                popupHtml: popupContent,
                popupOptions: {
                    autoClose: true
                }
            });
        });
    });
}
</script>
</body>
</html>
